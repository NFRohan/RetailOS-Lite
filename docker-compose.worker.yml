services:
  redis:
    image: redis:7-alpine
    container_name: retailos-lite-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    container_name: retailos-lite-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: retailos
      POSTGRES_PASSWORD: retailos
      POSTGRES_DB: retailos
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: retailos-lite-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: retailos
      MINIO_ROOT_PASSWORD: retailos-secret
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: retailos-lite-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 retailos retailos-secret; do sleep 2; done;
      /usr/bin/mc mb -p local/retailos-images;
      /usr/bin/mc anonymous set download local/retailos-images;
      exit 0;
      "

volumes:
  redis-data:
  postgres-data:
  minio-data:
