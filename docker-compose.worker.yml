services:
  redis:
    image: redis:7-alpine
    container_name: retailos-lite-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    container_name: retailos-lite-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: retailos
      POSTGRES_PASSWORD: retailos
      POSTGRES_DB: retailos
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  redis-data:
  postgres-data:
