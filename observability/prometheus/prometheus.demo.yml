global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: retailos-web
    metrics_path: /api/metrics
    static_configs:
      - targets: ["web:3000"]

  - job_name: retailos-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9101"]

  - job_name: retailos-ai-service
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-service:8001"]
